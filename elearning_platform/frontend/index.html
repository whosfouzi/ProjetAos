<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Atheneum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-tint": "#c0c1ff", "surface": "#0b1326", "on-surface-variant": "#c7c4d7",
              "primary-fixed-dim": "#c0c1ff", "on-secondary-container": "#d6a9ff",
              "tertiary-fixed-dim": "#ffb783", "primary": "#c0c1ff",
              "surface-container-highest": "#2d3449", "inverse-surface": "#dae2fd",
              "inverse-primary": "#494bd6", "primary-container": "#8083ff",
              "on-primary-fixed-variant": "#2f2ebe", "tertiary": "#ffb783",
              "error": "#ffb4ab", "secondary-fixed": "#f0dbff",
              "surface-container-high": "#222a3d", "on-secondary-fixed-variant": "#6900b3",
              "on-secondary-fixed": "#2c0051", "on-background": "#dae2fd",
              "outline-variant": "#464554", "on-primary-fixed": "#07006c",
              "on-tertiary-fixed": "#301400", "on-error": "#690005",
              "surface-variant": "#2d3449", "on-primary": "#1000a9",
              "surface-bright": "#31394d", "secondary-container": "#6f00be",
              "secondary": "#ddb7ff", "surface-dim": "#0b1326",
              "on-error-container": "#ffdad6", "tertiary-fixed": "#ffdcc5",
              "on-tertiary-container": "#452000", "on-surface": "#dae2fd",
              "secondary-fixed-dim": "#ddb7ff", "tertiary-container": "#d97721",
              "surface-container-low": "#131b2e", "inverse-on-surface": "#283044",
              "primary-fixed": "#e1e0ff", "surface-container-lowest": "#060e20",
              "surface-container": "#171f33", "on-secondary": "#490080",
              "on-tertiary": "#4f2500", "background": "#0b1326",
              "on-tertiary-fixed-variant": "#703700", "on-primary-container": "#0d0096",
              "outline": "#908fa0", "error-container": "#93000a"
            },
            borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" },
            fontFamily: { "headline": ["Manrope", "sans-serif"], "body": ["Inter", "sans-serif"], "label": ["Inter", "sans-serif"] }
          }
        }
      }
    </script>
    <style>
      .glass-card {
        background: rgba(45, 52, 73, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .text-glow { text-shadow: 0 0 40px rgba(192, 193, 255, 0.4); }
      .gradient-btn { background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 100%); }
      .bg-mesh {
        background-image:
          radial-gradient(at 0% 0%, rgba(192, 193, 255, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(221, 183, 255, 0.1) 0px, transparent 50%);
      }
      .glass-panel {
        background: rgba(23, 31, 51, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(192, 193, 255, 0.08);
      }
      .cta-gradient { background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 100%); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
