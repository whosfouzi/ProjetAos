services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=consul:8500"
      - "--providers.consulcatalog.exposedByDefault=false"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "./traefik_dynamic.yml:/etc/traefik/dynamic.yml:ro"
    networks:
      - elearning_net
    depends_on:
      - consul

  consul:
    image: hashicorp/consul:latest
    command: "agent -dev -client 0.0.0.0"
    ports:
      - "8500:8500"
    networks:
      - elearning_net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - elearning_net

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - elearning_net
    depends_on:
      - traefik

  auth-service:
    build: ./auth_service
    volumes:
      - ./auth_service:/app
      - ./auth_service/db.sqlite3:/app/db.sqlite3
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - CONSUL_HOST=${CORE_IP}
      - SERVICE_IP=${CORE_IP}
      - SECRET_KEY=django-insecure-test-key-shared-1234567890
      - PYTHONUNBUFFERED=1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/api/auth`)"
      - "traefik.http.routers.auth.priority=10"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"
    networks:
      - elearning_net
    depends_on:
      - traefik
      - consul

networks:
  elearning_net:
    driver: bridge
